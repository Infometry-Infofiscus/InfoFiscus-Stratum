<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- T icon: top bar -->
  <line x1="12" y1="16" x2="52" y2="16" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- T icon: vertical stem -->
  <line x1="32" y1="16" x2="32" y2="52" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <!-- T icon: bottom serif -->
  <line x1="22" y1="52" x2="42" y2="52" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
</svg>
